<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雾霾探测系统 · 西安</title>
    <!-- ECharts 图表库 -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: linear-gradient(145deg, #f5f7fa 0%, #e9ecf2 100%);
            min-height: 100vh;
            padding: 16px 12px 30px;
        }
        .app-container {
            max-width: 480px;
            margin: 0 auto;
        }
        .header-card {
            background: #1e2b3c;
            color: white;
            padding: 20px 18px;
            border-radius: 28px;
            margin-bottom: 20px;
            box-shadow: 0 12px 22px -8px rgba(0,20,40,0.25);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .location-section {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .location-icon {
            font-size: 28px;
            line-height: 1;
        }
        .city-name {
            font-size: 22px;
            font-weight: 600;
            letter-spacing: 0.5px;
        }
        .refresh-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            font-size: 16px;
            padding: 10px 16px;
            border-radius: 40px;
            font-weight: 500;
            backdrop-filter: blur(4px);
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        .refresh-btn:active {
            background: rgba(255,255,255,0.3);
            transform: scale(0.96);
        }
        .weather-panel {
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 32px;
            padding: 24px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .aqi-badge {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 18px;
        }
        .aqi-label {
            font-size: 18px;
            font-weight: 500;
            color: #334e68;
        }
        .aqi-value {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
            color: #1e2b3c;
        }
        .aqi-category {
            font-size: 18px;
            font-weight: 600;
            padding: 6px 16px;
            border-radius: 40px;
            background: #d4e2f0;
            color: #1e3e6d;
        }
        .weather-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px 12px;
            margin: 20px 0 10px;
        }
        .weather-item {
            display: flex;
            align-items: center;
            gap: 12px;
            background: white;
            padding: 12px 16px;
            border-radius: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.02);
        }
        .weather-icon {
            font-size: 30px;
        }
        .weather-info {
            display: flex;
            flex-direction: column;
        }
        .weather-label {
            font-size: 14px;
            color: #64748b;
        }
        .weather-number {
            font-size: 24px;
            font-weight: 700;
            color: #0f263b;
        }
        .chart-card {
            background: rgba(255,255,255,0.7);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 20px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 18px rgba(0,0,0,0.03);
            border: 1px solid rgba(255,255,255,0.6);
        }
        .chart-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            padding-left: 6px;
            color: #1f3a4e;
        }
        #chart-container {
            width: 100%;
            height: 280px;  /* 增加高度，从 220px 改为 280px */
        }
        .footer-note {
            text-align: center;
            color: #5e7180;
            font-size: 13px;
            margin-top: 12px;
            opacity: 0.8;
        }
        .error-message {
            color: #e74c3c;
            text-align: center;
            padding: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- Header：固定显示西安 -->
    <div class="header-card">
        <div class="location-section">
            <span class="location-icon">📍</span>
            <span class="city-name" id="city-display">西安</span>
        </div>
        <button class="refresh-btn" id="refresh-btn">⟳ 刷新</button>
    </div>

    <!-- Body：天气详情与AQI -->
    <div class="weather-panel">
        <div class="aqi-badge">
            <span class="aqi-label">空气质量指数</span>
            <span class="aqi-category" id="aqi-cat">--</span>
        </div>
        <div style="display: flex; align-items: baseline; justify-content: space-between;">
            <span class="aqi-value" id="aqi-value">---</span>
            <span style="color:#64748b;" id="update-time"></span>
        </div>
        <div class="weather-grid">
            <div class="weather-item">
                <span class="weather-icon">🌡️</span>
                <div class="weather-info">
                    <span class="weather-label">温度</span>
                    <span class="weather-number" id="temp-value">--°C</span>
                </div>
            </div>
            <div class="weather-item">
                <span class="weather-icon">💧</span>
                <div class="weather-info">
                    <span class="weather-label">湿度</span>
                    <span class="weather-number" id="humi-value">--%</span>
                </div>
            </div>
            <div class="weather-item">
                <span class="weather-icon">🌬️</span>
                <div class="weather-info">
                    <span class="weather-label">天气</span>
                    <span class="weather-number" id="weather-text" style="font-size: 18px;">--</span>
                </div>
            </div>
            <div class="weather-item">
                <span class="weather-icon">🍃</span>
                <div class="weather-info">
                    <span class="weather-label">PM2.5</span>
                    <span class="weather-number" id="pm25-value">--</span>
                </div>
            </div>
        </div>
        <div id="error-msg" class="error-message"></div>
    </div>

    <!-- 折线图：温度/湿度趋势 -->
    <div class="chart-card">
        <div class="chart-title">📈 温湿度趋势 (动态更新)</div>
        <div id="chart-container"></div>
    </div>
    <div class="footer-note">数据来源：和风天气 · 默认城市：西安</div>
</div>

<script>
    (function(){
        "use strict";

        // ==================== 已填入你的和风天气密钥 ====================
        const QWEATHER_HOST = 'pa4nmuqedn.re.qweatherapi.com';
        const QWEATHER_API_KEY = 'b1e502dc06384081a047a12c69d60ddd';
        // =============================================================

        // 默认城市：西安
        const DEFAULT_CITY = '西安';
        
        const cityDisplay = document.getElementById('city-display');
        const aqiValue = document.getElementById('aqi-value');
        const aqiCat = document.getElementById('aqi-cat');
        const tempValue = document.getElementById('temp-value');
        const humiValue = document.getElementById('humi-value');
        const weatherText = document.getElementById('weather-text');
        const pm25Value = document.getElementById('pm25-value');
        const updateTimeSpan = document.getElementById('update-time');
        const errorMsg = document.getElementById('error-msg');
        const refreshBtn = document.getElementById('refresh-btn');

        let chartInstance = null;

        // ---------- 和风天气 API 调用 ----------
        async function fetchWeatherAndAQI(city) {
            if (!city) {
                errorMsg.innerText = '城市信息无效';
                return;
            }
            
            // 显示加载状态
            tempValue.innerText = '--°C';
            humiValue.innerText = '--%';
            weatherText.innerText = '加载中';
            pm25Value.innerText = '--';
            aqiValue.innerText = '---';
            errorMsg.innerText = '';
            
            try {
                // 1. 城市搜索 - 获取 Location ID
                console.log(`正在查询城市: ${city}`);
                const geoUrl = `https://${QWEATHER_HOST}/geo/v2/city/lookup?location=${encodeURIComponent(city)}`;
                const geoResp = await fetch(geoUrl, {
                    headers: { 'X-QW-Api-Key': QWEATHER_API_KEY }
                });
                const geoData = await geoResp.json();
                
                console.log('城市查询结果:', geoData);
                
                if (geoData.code !== '200' || !geoData.location || geoData.location.length === 0) {
                    errorMsg.innerText = `城市查询失败: ${geoData.code || '未知错误'}`;
                    console.error('城市查询失败:', geoData);
                    return;
                }
                const locationId = geoData.location[0].id;
                const cityName = geoData.location[0].name;
                cityDisplay.innerText = cityName;
                
                console.log(`城市: ${cityName}, Location ID: ${locationId}`);
                
                // 2. 获取实时天气
                const weatherUrl = `https://${QWEATHER_HOST}/v7/weather/now?location=${locationId}`;
                const weatherResp = await fetch(weatherUrl, { 
                    headers: { 'X-QW-Api-Key': QWEATHER_API_KEY } 
                });
                const weatherData = await weatherResp.json();
                
                console.log('天气数据:', weatherData);
                
                // 空气质量接口需要付费，暂时用占位数据
                // 实际项目中可替换为高德地图免费空气质量 API
                updateWeatherUI(weatherData, null);
                
                // 📤 模拟保存到服务器
                console.log('[模拟保存到服务器]', {
                    city: cityName, 
                    weather: weatherData.now,
                    timestamp: new Date().toISOString()
                });
                
            } catch (error) {
                console.error('获取天气失败:', error);
                errorMsg.innerText = `获取天气数据失败: ${error.message}`;
            }
        }

        function updateWeatherUI(weatherData, airData) {
            const now = new Date();
            updateTimeSpan.innerText = `更新 ${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
            
            if (weatherData.code === '200' && weatherData.now) {
                const w = weatherData.now;
                tempValue.innerText = `${w.temp}°C`;
                humiValue.innerText = `${w.humidity}%`;
                weatherText.innerText = w.text;
                updateChart(parseFloat(w.temp), parseFloat(w.humidity));
            } else {
                tempValue.innerText = '--°C';
                humiValue.innerText = '--%';
                weatherText.innerText = '获取失败';
                console.error('天气数据异常:', weatherData);
            }
            
            // 空气质量显示占位（等待接入免费 API）
            aqiValue.innerText = '--';
            aqiCat.innerText = '需付费';
            pm25Value.innerText = '--';
        }

        // ---------- ECharts 折线图（排版优化版）----------
        function initChart() {
            const chartDom = document.getElementById('chart-container');
            if (chartDom) {
                chartInstance = echarts.init(chartDom);
                const option = {
                    tooltip: { 
                        trigger: 'axis',
                        axisPointer: { type: 'shadow' }
                    },
                    legend: { 
                        data: ['温度 (°C)', '湿度 (%)'], 
                        bottom: 0,  // 放在底部
                        left: 'center',
                        icon: 'roundRect',
                        itemWidth: 20,
                        itemHeight: 10,
                        textStyle: { fontSize: 13, fontWeight: 500 }
                    },
                    grid: { 
                        left: '10%',    // 左边距增加
                        right: '8%',     // 右边距增加
                        top: 25,         // 顶部留空
                        bottom: 40,      // 底部留空给图例
                        containLabel: false
                    },
                    xAxis: {
                        type: 'category',
                        data: ['1h前', '2h前', '3h前', '4h前', '5h前', '6h前', '现在'],
                        axisLabel: { 
                            fontWeight: 500,
                            fontSize: 12,
                            margin: 10
                        },
                        axisLine: { lineStyle: { color: '#aaa' } }
                    },
                    yAxis: [
                        { 
                            type: 'value', 
                            name: '温度 °C', 
                            nameTextStyle: { fontSize: 12, fontWeight: 500 },
                            min: 0, 
                            max: 40,
                            splitLine: { lineStyle: { type: 'dashed', color: '#e0e0e0' } }
                        },
                        { 
                            type: 'value', 
                            name: '湿度 %', 
                            nameTextStyle: { fontSize: 12, fontWeight: 500 },
                            min: 0, 
                            max: 100,
                            splitLine: { show: false }
                        }
                    ],
                    series: [
                        { 
                            name: '温度 (°C)', 
                            type: 'line', 
                            data: [22, 23, 24, 25, 24, 23, 22], 
                            smooth: true, 
                            color: '#f39c12',
                            lineStyle: { width: 3 },
                            symbol: 'circle',
                            symbolSize: 8
                        },
                        { 
                            name: '湿度 (%)', 
                            type: 'line', 
                            yAxisIndex: 1, 
                            data: [45, 48, 52, 55, 60, 58, 62], 
                            smooth: true, 
                            color: '#3498db',
                            lineStyle: { width: 3 },
                            symbol: 'circle',
                            symbolSize: 8
                        }
                    ]
                };
                chartInstance.setOption(option);
                
                // 响应式调整
                window.addEventListener('resize', function() {
                    chartInstance.resize();
                });
            }
        }

        function updateChart(temp, humi) {
            if (!chartInstance) return;
            const option = chartInstance.getOption();
            let tempData = option.series[0].data;
            let humiData = option.series[1].data;
            tempData.shift();
            tempData.push(temp);
            humiData.shift();
            humiData.push(humi);
            chartInstance.setOption({
                series: [{ data: tempData }, { data: humiData }]
            });
        }

        // ---------- 入口 ----------
        function main() {
            initChart();
            cityDisplay.innerText = DEFAULT_CITY;
            fetchWeatherAndAQI(DEFAULT_CITY);
            
            refreshBtn.addEventListener('click', function() {
                fetchWeatherAndAQI(DEFAULT_CITY);
            });
        }

        main();
    })();
</script>
</body>
</html>
